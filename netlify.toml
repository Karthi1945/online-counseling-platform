[build]
  command = "cd client && npm run build"
  publish = "client/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[env.production]
  [env.production.context.production.environment]
    VITE_API_URL = "your_backend_url_here"
    VITE_SOCKET_URL = "your_backend_url_here"

  [build]
  base = "client"
  command = "npm ci && npm run build"
  publish = "dist"

